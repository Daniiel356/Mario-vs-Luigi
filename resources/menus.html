<template id="mainMenu">
    <button id="btnPlay" class="btn1" onclick="setScene(scenes.PLAYMENU)">Jugar</button>
</template>

<template id="playMenu">
    <button id="btnDuo" class="btn1" onclick="setScene(scenes.DUOSETTINGS)">Individual</button>
    <button id="btnMp" class="btn1">Multijugador <span>(en desarrollo)</span></button>
</template>

<template id="duoSettings">
    <h2>Configuración</h2>
    <div class="duoDiv">
        <label>
            <span>Nombre: </span><input maxlength="10" placeholder="Luigi" id="p1Name">
        </label>
        <select>
            <option value="r">Rojo</option>
            <option value="g" selected>Verde</option>
            <option value="b">Azul</option>
            <option value="y">Amarillo</option>
            <option value="p">Morado</option>
        </select>
        <canvas></canvas>
    </div>
    <div class="duoDiv" style="left: 51.25vw">
        <label>
            <span>Nombre: </span><input maxlength="10" placeholder="Mario" id="p2Name">
        </label>
        <select>
            <option value="r">Rojo</option>
            <option value="g">Verde</option>
            <option value="b" selected>Azul</option>
            <option value="y">Amarillo</option>
            <option value="p">Morado</option>
        </select>
        <canvas></canvas>
    </div>
    <button class="btn1" id="btndouPlay" onclick="initGame();">Jugar</button>
</template>

<template id="game">
    <div id="gameContent">
        <div class="touchPanel">
            <button class="btn2"></button>
            <button class="btn2"></button>
            <button class="btn2"></button>
        </div>
        <div class="touchPanel" data-pos="right">
            <button class="btn2"></button>
            <button class="btn2"></button>
            <button class="btn2"></button>
        </div>
    </div>
</template>
